# Install on server as root:
#   sudo cp bin/logrotate-motogp.conf /etc/logrotate.d/motogp
# Then test:
#   sudo logrotate -d /etc/logrotate.d/motogp

# Application logs are rotated by Monolog RotatingFileHandler.
# Keep OS-level rotation here for PHP runtime errors.
/var/www/motogp/var/log/php_error.log {
    daily
    rotate 30
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    create 0640 www-data www-data
}
